name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller mediapipe opencv-python numpy
      - run: pyinstaller --noconfirm --onefile --console --add-data "utkucann.mp3:." --collect-all mediapipe --copy-metadata mediapipe focus-tracker.py
      - uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/focus-tracker

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller mediapipe opencv-python numpy
      - run: pyinstaller --noconfirm --onefile --console --add-data "utkucann.mp3;." --collect-all mediapipe --copy-metadata mediapipe focus-tracker.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/focus-tracker.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          files: |
            artifacts/mac-app/focus-tracker
            artifacts/windows-exe/focus-tracker.exe